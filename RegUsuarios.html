<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/styles_RegUsuarios.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario</title>
</head>
<body>
  <header>
    <button onclick="window.location.href='login.html'">←</button>    
  </header>
  <div class="container">
    <div class="logo">
      <img src="https://i.postimg.cc/264yGs0d/logo-redondo.png" alt="Logo Kéfir Raíz Vital">
    </div>
    <h2>Integralmente tú</h2>
    <h1>Registro de Usuario</h1>
    <form id="registerForm" class="form-group">
      <label for="username">Nombre:</label>
      <input type="text" id="username" name="username" required minlength="3" autocomplete="username">
      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <label for="phone">Teléfono:</label>
      <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" placeholder="Ej: 2222222222">
      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" required minlength="6">
      <label for="confirmPassword">Confirmar Contraseña:</label>
      <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
      <label>Tipo de usuario:</label><br>
  <label><input type="radio" name="rol" value="cliente" checked> 👤 Cliente</label>
  <label><input type="radio" name="rol" value="superadmin"> 👑 Super Admin</label>
      <button type="submit" class="submit">Guardar Usuario</button>
    </form>
  </div>
  <script src="/js/Registro.js"></script> <!-- CORREGIDO -->
</body>
</html>
