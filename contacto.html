<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto – Kéfir Raíz Vital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/styles_contacto.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 🧡 HEADER -->
  <header class="contact-header">
    <button class="btn-back" onclick="window.location.href='/menuPrincipal.html'">←</button>
    <h1>Contacto 🌿</h1>
    <p>Estamos felices de escucharte</p>
  </header>

  <!-- 🌿 CONTENEDOR GENERAL -->
  <section class="contact-container">

    <!-- INFO -->
    <div class="contact-info">
      <h2>Información de contacto</h2>
      <p>💌 Correo: <strong>contacto@kefirraizvital.com</strong></p>
      <p>📞 Teléfono: <strong>+52 229 XXX XXXX</strong></p>
      <p>📍 Veracruz, México</p>

      <div class="social-links">
        <a href="#" class="social-btn">Facebook</a>
        <a href="#" class="social-btn">Instagram</a>
        <a href="#" class="social-btn">WhatsApp</a>
      </div>
    </div>

    <!-- FORMULARIO -->
    <form class="contact-form" onsubmit="enviarMensaje(event)">
      <h2>Déjanos tu mensaje</h2>

      <div class="input-group">
        <label>Nombre completo</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="input-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label>Teléfono / WhatsApp</label>
        <input type="tel" id="telefono">
      </div>

      <div class="input-group">
        <label>Mensaje</label>
        <textarea rows="4" id="mensaje" required></textarea>
      </div>

      <button type="submit" class="send-btn">Enviar mensaje ✨</button>
    </form>

  </section>

  <script src="js/contacto.js"></script>
</body>
</html>
