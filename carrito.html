<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="CSS/styles_carrito.css">

</head>
<body>
<header class="header">
  <button class="btn-back" onclick="window.location.href='/menuPrincipal.html'">Seguir comprando</button>
  <h1 id="title-cart">Tu carrito de compras 🛒</h1>
  <img src="https://i.postimg.cc/264yGs0d/logo-redondo.png" alt="Kéfir Raíz Vital Logo">
</header>
  <main>
<div class="cart-container">
  <div id="cart-items" class="cart-items"></div>
  <div class="cart-summary">
    <p class="total-label">Total:</p>
    <p class="total-amount" id="total-amount"> <span id="total">$0 MXN</span>  </p>
  </div>
  <button class="checkout-btn" onclick="goToPayment()">Ir a métodos de pago</button>
</div>
  </main>
  <script src="js/Carrito.js"></script>
</body>
</html>
